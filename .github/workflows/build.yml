name: Build and Release Plugin

on:
  push:
    branches: [ "main" ]
    tags:
      - "v*"
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn -B package --file pom.xml

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CloudFallCore-Plugin
        path: target/CloudFallCore-*.jar

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: target/CloudFallCore-*.jar
        name: CloudFallCore ${{ github.ref_name }}
        body: |
          ## What's Changed in v1.1.0
          * ⚙️ **Toggleable Utility Commands**: You can now enable/disable `/buyrank`, `/buykits`, and `/support` individually in `config.yml`.
          * 💬 **Customizable Command Responses**: Added custom message arrays and customizable `disabled-message` fields for disabled commands.
          * 📦 **Automatic Builds**: Integrated automated GitHub Actions to compile and attach the plugin JAR as a release asset.
          * ☁️ **Clean Config Template**: Default configuration is sanitized with general placeholders, keeping server-specific branding separate.
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
