# Auto-Broadcaster settings (in minutes)
broadcaster:
  enabled: true
  interval: 5
  messages:
    - "<color:#ff5555>❤</color> <gray>Love playing on our server?</gray> <click:open_url:'https://store.yourserver.com'><hover:show_text:'Click here!'><color:#55ff55><bold>Support us by buying ranks and more here!</bold></color></hover></click>"
    - "<color:#5555ff>☁</color> <gray>Don't forget to join our Discord community!</gray> <click:open_url:'https://discord.gg/yourinvite'><hover:show_text:'Click to join'><color:#55ffff><bold>discord.gg/yourinvite</bold></color></hover></click>"

# Fun/Horror Mechanics
mechanics:
  cave-horror:
    enabled: true
    # The chance (out of 100) to play a creepy sound every 10 seconds when deep underground
    chance: 15
    y-level: 10
  blood-moon:
    enabled: true
    # Chance (out of 100) for a blood moon to happen each nightfall
    chance: 10

# Living World Engine Settings
engine:
  enabled: true
  min-interval-minutes: 3
  max-interval-minutes: 8
  category-weights:
    weather: 18
    horror: 20
    reward: 30
    combat: 7
    social: 15
    mystery: 10

